<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>EmblaScrollbar</title>
		<script src="https://unpkg.com/embla-carousel/embla-carousel.umd.js"></script>
		<script src="EmblaScrollbar.js"></script>
		<script>
			// Initialize the scrollbar for EmblaCarousel
			document.addEventListener('DOMContentLoaded', () => {
				const emblaNode = document.querySelector('.embla');
				const scrollbarContainer = document.querySelector(
					'.scrollbar-container'
				);
				const scrollbarThumb = document.querySelector('.scrollbar-thumb');

				if (emblaNode && scrollbarContainer && scrollbarThumb) {
					new EmblaScrollbar(emblaNode, scrollbarContainer, scrollbarThumb);
				}
			});
		</script>
		<style>
			body {
				font-family: Arial, sans-serif;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100vh;
				margin: 0;
				user-select: none;
			}
			.embla {
				overflow: hidden;
				width: 80%;
				max-width: 600px;
				outline: none;
			}
			.embla__container {
				display: flex;
			}
			.embla__slide {
				flex: 0 0 50%;
				margin-right: 10px;
				background: lightgray;
				display: flex;
				align-items: center;
				justify-content: center;
				border-radius: 8px;
				font-size: 24px;
				height: 200px;
			}
			.scrollbar-container {
				position: relative;
				width: 80%;
				max-width: 600px;
				height: 12px;
				background: #ccc;
				border-radius: 6px;
				cursor: pointer;
				margin-top: 10px;
			}
			.scrollbar-thumb {
				position: absolute;
				height: 12px;
				background: orange;
				border-radius: 6px;
				cursor: grab;
				top: 0;
				transition: width 0.2s ease-in-out;
				outline: none;
			}
			.scrollbar-thumb:focus {
				outline: 2px solid #000;
				background: darkblue;
			}
		</style>
	</head>
	<body>
		<div
			class="embla"
			role="region"
			aria-label="Carousel"
		>
			<div class="embla__container">
				<div
					class="embla__slide"
					role="group"
					aria-label="Slide 1 of 5"
				>
					1
				</div>
				<div
					class="embla__slide"
					role="group"
					aria-label="Slide 2 of 5"
				>
					2
				</div>
				<div
					class="embla__slide"
					role="group"
					aria-label="Slide 3 of 5"
				>
					3
				</div>
				<div
					class="embla__slide"
					role="group"
					aria-label="Slide 4 of 5"
				>
					4
				</div>
				<div
					class="embla__slide"
					role="group"
					aria-label="Slide 5 of 5"
				>
					5
				</div>
			</div>
		</div>

		<div
			class="scrollbar-container"
			role="presentation"
		>
			<div
				class="scrollbar-thumb"
				role="button"
				aria-label="Carousel Scrollbar"
				tabindex="0"
				aria-valuemin="0"
				aria-valuemax="100"
				aria-valuenow="0"
			></div>
		</div>
	</body>
</html>
