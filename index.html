<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Embla Scrollbar Plugin Demo</title>
		<script
			defer
			src="https://unpkg.com/embla-carousel@8/embla-carousel.umd.js"
		></script>
		<script
			defer
			src="EmblaScrollbar.js"
		></script>
		<script defer>
			document.addEventListener('DOMContentLoaded', () => {
				const emblaNode = document.querySelector('.embla');
				const prevButton = document.querySelector('.carousel__button--prev');
				const nextButton = document.querySelector('.carousel__button--next');
				const scrollbarTrack = document.querySelector('.scrollbar');
				const scrollbarThumb = document.querySelector('.scrollbar__thumb');
				const currentIndex = document.querySelector('.carousel__current');

				const scrollbar = EmblaScrollbar({
					trackNode: scrollbarTrack,
					thumbNode: scrollbarThumb,
					minThumbWidth: 56,
				});

				const emblaApi = EmblaCarousel(
					emblaNode,
					{
						align: 'start',
						containScroll: 'trimSnaps',
						loop: false,
					},
					[scrollbar],
				);

				const updateState = () => {
					prevButton.disabled = !emblaApi.canScrollPrev();
					nextButton.disabled = !emblaApi.canScrollNext();
					currentIndex.textContent = String(
						emblaApi.selectedScrollSnap() + 1,
					).padStart(2, '0');
				};

				prevButton.addEventListener('click', () => emblaApi.scrollPrev());
				nextButton.addEventListener('click', () => emblaApi.scrollNext());
				emblaApi.on('select', updateState);
				emblaApi.on('reInit', updateState);
				updateState();
			});
		</script>
		<style>
			* {
				box-sizing: border-box;
			}

			:root {
				color: #111111;
				background: #f4f4f2;
				font-family:
					'Helvetica Neue', Helvetica, Arial, ui-sans-serif, system-ui,
					sans-serif;
				font-size: 16px;
			}

			body {
				min-height: 100vh;
				margin: 0;
				padding: 42px 24px;
				background:
					linear-gradient(#d9d9d4 1px, transparent 1px),
					linear-gradient(90deg, #d9d9d4 1px, transparent 1px), #f4f4f2;
				background-size: 72px 72px;
			}

			button {
				font: inherit;
			}

			main {
				display: grid;
				grid-template-columns: 180px minmax(0, 1fr);
				gap: 24px;
				width: 100%;
				max-width: 96em;
				margin: 0 auto;
			}

			.demo-header {
				display: grid;
				align-content: space-between;
				min-height: 520px;
				border-top: 4px solid #111111;
				padding-top: 18px;
			}

			.brand-mark {
				display: grid;
				width: 44px;
				height: 44px;
				place-items: center;
				color: #f4f4f2;
				background: #e11d2e;
				font-size: 0.75rem;
				font-weight: 700;
			}

			h1 {
				max-width: 7ch;
				margin: 32px 0 0;
				font-size: 1.25rem;
				font-weight: 700;
				line-height: 0.92;
				letter-spacing: 0;
			}

			.demo-meta {
				display: grid;
				gap: 8px;
				margin: 0;
				font-size: 0.8125rem;
				line-height: 1.35;
			}

			.carousel {
				display: grid;
				grid-template-rows: auto 1fr auto;
				min-width: 0;
				min-height: 520px;
				border-top: 4px solid #111111;
				padding-top: 18px;
			}

			.carousel__bar {
				display: grid;
				grid-template-columns: 1fr auto;
				align-items: start;
				gap: 18px;
				margin-bottom: 28px;
			}

			.carousel__counter {
				display: flex;
				align-items: baseline;
				gap: 6px;
				min-width: 92px;
				font-size: 0.875rem;
				font-weight: 700;
			}

			.carousel__current {
				font-size: 2.75rem;
				line-height: 0.9;
			}

			.carousel__total {
				color: #6f6f6f;
			}

			.carousel__controls {
				display: flex;
				gap: 8px;
			}

			.carousel__button {
				display: grid;
				width: 48px;
				height: 48px;
				place-items: center;
				border: 1px solid #111111;
				border-radius: 0;
				color: #111111;
				background: #f4f4f2;
				cursor: pointer;
				font-size: 1.125rem;
				line-height: 1;
			}

			.carousel__button:disabled {
				border-color: #b9b9b3;
				color: #b9b9b3;
				cursor: default;
			}

			.carousel__button:not(:disabled):hover,
			.carousel__button:not(:disabled):focus-visible {
				color: #f4f4f2;
				background: #111111;
				outline: none;
			}

			.embla {
				overflow: hidden;
				min-width: 0;
			}

			.embla__container {
				display: flex;
				gap: 18px;
			}

			.embla__slide {
				position: relative;
				display: grid;
				flex: 0 0 min(78%, 420px);
				grid-template-rows: auto 1fr auto;
				min-width: 0;
				height: 360px;
				padding: 24px;
				border: 1px solid #111111;
				background: #fbfbf9;
			}

			.embla__slide::before {
				position: absolute;
				inset: 0;
				background:
					linear-gradient(
						90deg,
						transparent 49.8%,
						var(--accent) 50%,
						transparent 50.2%
					),
					linear-gradient(transparent 49.8%, #d2d2cc 50%, transparent 50.2%);
				content: '';
				opacity: 0.9;
				pointer-events: none;
			}

			.slide__index,
			.slide__caption,
			.slide__title {
				position: relative;
				z-index: 1;
			}

			.slide__index {
				color: var(--accent);
				font-size: 0.875rem;
				font-weight: 700;
			}

			.slide__title {
				align-self: center;
				margin: 0;
				font-size: 4rem;
				font-weight: 700;
				line-height: 0.88;
				letter-spacing: 0;
			}

			.slide__caption {
				display: grid;
				grid-template-columns: 1fr auto;
				gap: 16px;
				border-top: 1px solid #111111;
				padding-top: 12px;
				color: #575757;
				font-size: 0.8125rem;
				line-height: 1.3;
			}

			.embla__slide:nth-child(1) {
				--accent: #e11d2e;
			}

			.embla__slide:nth-child(2) {
				--accent: #0057b8;
			}

			.embla__slide:nth-child(3) {
				--accent: #111111;
			}

			.embla__slide:nth-child(4) {
				--accent: #ffb000;
			}

			.embla__slide:nth-child(5) {
				--accent: #008c45;
			}

			.embla__slide:nth-child(6) {
				--accent: #e11d2e;
			}

			.scrollbar {
				position: relative;
				width: 100%;
				height: 18px;
				margin-top: 28px;
				border-top: 1px solid #111111;
				border-bottom: 1px solid #111111;
				background: transparent;
				cursor: pointer;
			}

			.scrollbar__thumb {
				position: absolute;
				top: -1px;
				left: 0;
				height: 18px;
				border: 0;
				border-radius: 0;
				background: #e11d2e;
				cursor: grab;
				outline: none;
				touch-action: none;
				transition:
					background-color 160ms ease,
					width 180ms ease;
				will-change: transform, width;
			}

			.scrollbar__thumb:focus-visible {
				background: #111111;
				box-shadow:
					0 0 0 3px #f4f4f2,
					0 0 0 5px #e11d2e;
			}

			@media (max-width: 760px) {
				body {
					padding: 24px 16px;
					background-size: 48px 48px;
				}

				main {
					grid-template-columns: 1fr;
				}

				.demo-header,
				.carousel {
					min-height: 0;
				}

				.demo-header {
					gap: 26px;
				}

				h1 {
					max-width: 10ch;
					font-size: 2.625rem;
				}

				.demo-meta {
					grid-template-columns: repeat(2, minmax(0, 1fr));
				}

				.carousel__bar {
					grid-template-columns: 1fr auto;
				}

				.carousel__controls {
					grid-column: 2;
					grid-row: 1;
				}

				.embla__slide {
					flex-basis: 84%;
					height: 300px;
					padding: 18px;
				}

				.slide__title {
					font-size: 3.125rem;
				}
			}

			@media (max-width: 480px) {
				.carousel__bar {
					gap: 12px;
				}

				.carousel__button {
					width: 42px;
					height: 42px;
				}

				.demo-meta {
					grid-template-columns: 1fr;
				}

				.embla__slide {
					flex-basis: 90%;
					height: 280px;
				}

				.slide__title {
					font-size: 2.5rem;
				}
			}
		</style>
	</head>
	<body>
		<main>
			<header class="demo-header">
				<div>
					<div class="brand-mark">E</div>
					<h1>Embla Scrollbar</h1>
				</div>
			</header>

			<section
				class="carousel"
				aria-label="Featured slides"
			>
				<div class="carousel__bar">
					<div
						class="carousel__counter"
						aria-live="polite"
					>
						<span class="carousel__current">01</span>
						<span class="carousel__total">/ 06</span>
					</div>
					<div
						class="carousel__controls"
						aria-label="Carousel controls"
					>
						<button
							class="carousel__button carousel__button--prev"
							type="button"
							aria-label="Previous slide"
						>
							&#8592;
						</button>
						<button
							class="carousel__button carousel__button--next"
							type="button"
							aria-label="Next slide"
						>
							&#8594;
						</button>
					</div>
				</div>

				<div class="embla">
					<div class="embla__container">
						<article class="embla__slide">
							<span class="slide__index">01</span>
							<h2 class="slide__title">Less But Better</h2>
							<div class="slide__caption">
								<span>Grid 12</span>
								<span>1960</span>
							</div>
						</article>
						<article class="embla__slide">
							<span class="slide__index">02</span>
							<h2 class="slide__title">Good Design Is Useful</h2>
							<div class="slide__caption">
								<span>System 08</span>
								<span>1976</span>
							</div>
						</article>
						<article class="embla__slide">
							<span class="slide__index">03</span>
							<h2 class="slide__title">Clarity Above All</h2>
							<div class="slide__caption">
								<span>Specimen A</span>
								<span>2026</span>
							</div>
						</article>
						<article class="embla__slide">
							<span class="slide__index">04</span>
							<h2 class="slide__title">Order Creates Calm</h2>
							<div class="slide__caption">
								<span>Layout 04</span>
								<span>1959</span>
							</div>
						</article>
						<article class="embla__slide">
							<span class="slide__index">05</span>
							<h2 class="slide__title">Quiet Controls</h2>
							<div class="slide__caption">
								<span>Control 02</span>
								<span>1982</span>
							</div>
						</article>
						<article class="embla__slide">
							<span class="slide__index">06</span>
							<h2 class="slide__title">Every Detail Counts</h2>
							<div class="slide__caption">
								<span>Final 06</span>
								<span>2030</span>
							</div>
						</article>
					</div>
				</div>

				<div class="scrollbar">
					<div
						class="scrollbar__thumb"
						aria-label="Carousel scroll position"
					></div>
				</div>
			</section>
		</main>
	</body>
</html>
